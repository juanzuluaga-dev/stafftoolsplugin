name: Compilar plugin

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Descomprimir el proyecto
        run: unzip -o StaffToolsPlugin.zip -d extracted

      - name: Instalar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Compilar con Maven
        run: mvn -B clean package
        working-directory: extracted/StaffToolsPlugin

      - name: Subir el jar como descargable
        uses: actions/upload-artifact@v4
        with:
          name: StaffToolsPlugin-jar
          path: extracted/StaffToolsPlugin/target/*.jar
